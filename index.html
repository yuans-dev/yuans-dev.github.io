<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/x-icon" href="assets/logo.svg" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <title>Yuan on GitHub</title>
  </head>
  <body>
    <div class="navbar" id="navbar">
      <div class="alignleft">
        <button class="menubutton" id="menu">
          <span class="material-symbols-outlined">menu</span>
        </button>
        <ul class="navlinks" id="navlinks">
          <li>
            <a class="selected" id="homelink"
              ><span id="homeicon" class="material-symbols-outlined">home</span>
              <h3 id="hometext">home</h3></a
            >
          </li>
          <li>
            <a id="aboutlink"><h3>about</h3></a>
          </li>
          <li>
            <a id="skillslink"><h3>skills</h3></a>
          </li>
          <li></li>
          <li id="projects-btn">
            <a class="projects-btn">
              <h3>projects</h3>
              <span id="projexpandmore" class="material-symbols-outlined"
                >expand_more
              </span>
            </a>
            <ul id="projects-popup" class="projects-popup">
              <li>
                <a href="https://yuans-dev.github.io/melody-uwp/"
                  ><h3>Melody</h3>
                  <img
                    class="projecttypeicon"
                    src="assets/DesktopApp.svg"
                    alt="desktopapp"
                /></a>
              </li>
              <li>
                <a href="webprojects/realestate_website/ex2.html"
                  ><h3>Real Estate Website</h3>
                  <img class="projecttypeicon" src="assets/Web.svg" alt="web"
                /></a>
              </li>
              <li>
                <a href=""
                  ><h3>Music Blog Website</h3>
                  <img class="projecttypeicon" src="assets/Web.svg" alt="web"
                /></a>
              </li>
              <li>
                <a href=""><h3>Project C</h3></a>
              </li>
            </ul>
          </li>
          <li id="navdownload-btn">
            <button class="navdownload-btn">
              <h2>hire me</h2>
            </button>
          </li>
          <li>
            <a
              id="hiremecompact"
              class="hiremecompact"
              href="https://github.com/yuans-dev/"
              ><h3><nobr>hire me!</nobr></h3></a
            >
          </li>
          <li>
            <a
              id="githubcompact"
              class="githubcompact"
              href="https://github.com/yuans-dev/"
              ><h3>github</h3></a
            >
          </li>
        </ul>
      </div>

      <div class="alignright">
        <button class="github-btn" id="github-btn">
          <h2>github <span class="material-symbols-outlined">code</span></h2>
        </button>
      </div>
    </div>
    <div class="herobanner">
      <div class="videodiv">
        <video autoplay muted loop class="rainoverlay">
          <source src="assets/dust_overlay.mp4" type="video/mp4" />
        </video>
      </div>
      <div class="content">
        <h1>Hi, I am Yuan</h1>
        <h2>Front-end developer</h2>
        <h2>Page content coming soon!</h2>
      </div>
    </div>

    <script>
      const navbar = document.getElementById("navbar");
      const menubutton = document.getElementById("menu");
      const navigation = document.getElementById("navlinks");
      const homeicon = document.getElementById("homeicon");
      const hometext = document.getElementById("hometext");
      menubutton.addEventListener("click", function () {
        if (navigation.classList.contains("collapsewidth")) {
          navigation.classList.remove("collapsewidth");
        } else {
          navigation.classList.add("collapsewidth");
        }
      });
      window.onload = toggleCompactMode;
      window.onresize = toggleCompactMode;
      function toggleCompactMode() {
        var navbarrect = navbar.getBoundingClientRect();
        //console.log(navbarrect.width);
        if (navbarrect.width <= 600) {
          navbar.classList.add("compact");
          hometext.style.display = "none";
          homeicon.style.display = "flex";
        } else {
          navbar.classList.remove("compact");
          homeicon.style.display = "none";
          hometext.style.display = "flex";
        }
      }
    </script>
    <script>
      const projectbtn = document.getElementById("projects-btn");
      const projectbtnicon = document.getElementById("projexpandmore");
      const projectspopup = document.getElementById("projects-popup");
      projectbtn.addEventListener("mouseenter", function () {
        positionProjectsPopup();
        projectbtnicon.classList.add("expandmorerotate");
        projectspopup.classList.add("expandheight");
      });
      projectbtn.addEventListener("mouseleave", function () {
        positionProjectsPopup();
        projectbtnicon.classList.remove("expandmorerotate");
        projectspopup.classList.remove("expandheight");
      });

      function positionProjectsPopup() {
        var projectbtnpos = projectbtn.getBoundingClientRect();

        var currentpos = projectspopup.getBoundingClientRect();
        console.log(projectbtnpos.left);
        console.log(currentpos.left);
        projectspopup.style.marginTop = projectbtnpos.bottom;
        projectspopup.style.left = projectbtnpos.left - 12 + "px";
      }
    </script>
  </body>
</html>
